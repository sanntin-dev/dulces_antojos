<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- viewport: clave para que se vea bien en el celu y no permita zoom raro -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dulces Antojos — hecho en casa</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Toda la app vive dentro de este contenedor centrado (look "app en el celu") -->
  <div class="app">

    <!-- 1) Header -->
    <header class="header">
      <h1 class="header__nombre">Dulces Antojos</h1>
      <!-- Logo en el medio, entre el nombre y el lema -->
      <img class="header__logo" src="logo.jpg" alt="Dulces Antojos — hecho en casa" />
      <p class="header__lema">— hecho en casa —</p>
    </header>

    <!-- 2) Barra de categorías (chips). Se llena dinámicamente desde el JSON. -->
    <nav class="chips" id="chips" aria-label="Categorías"></nav>

    <!-- 3) Secciones de productos. Se llenan dinámicamente desde el JSON. -->
    <main class="catalogo" id="catalogo">
      <!-- Mensaje de carga / error. JS lo reemplaza o lo muestra según el caso. -->
      <p class="estado" id="estado">Cargando catálogo…</p>
    </main>

  </div>

  <!-- 4) Barra fija de pedido (abajo, ancho completo). Solo visible si hay items. -->
  <div class="barra-pedido" id="barraPedido" hidden>
    <div class="barra-pedido__info">
      <span class="barra-pedido__cant" id="barraCant">0 productos</span>
      <span class="barra-pedido__total" id="barraTotal">$0</span>
    </div>
    <button class="barra-pedido__btn" id="barraVerPedido">Ver pedido</button>
  </div>

  <!-- Fondo oscuro detrás del panel del carrito -->
  <div class="overlay" id="overlay" hidden></div>

  <!-- 4b) Panel deslizante (bottom sheet) con el pedido -->
  <section class="sheet" id="sheet" aria-label="Tu pedido" hidden>
    <div class="sheet__header">
      <h2 class="sheet__titulo">Tu pedido</h2>
      <button class="sheet__cerrar" id="sheetCerrar" aria-label="Cerrar">&times;</button>
    </div>

    <div class="sheet__items" id="sheetItems"><!-- items dinámicos --></div>

    <div class="sheet__footer">
      <div class="sheet__total">
        <span>Total</span>
        <span id="sheetTotal">$0</span>
      </div>
      <button class="btn-whatsapp" id="btnWhatsapp">Enviar pedido por WhatsApp</button>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
