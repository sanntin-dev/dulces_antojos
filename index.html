<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <!-- viewport: clave para que se vea bien en el celu y no permita zoom raro -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dulces Antojos — hecho en casa</title>
  <meta name="description" content="Pastelería casera. Hacé tu pedido y enviálo por WhatsApp." />

  <!-- Favicon: el iconito de la pestaña del navegador.
       Usa img/marca/logo_favicon.jpg (por ahora es una copia del logo; podés
       reemplazar ese archivo por uno más simple/cuadrado cuando quieras). -->
  <link rel="icon" href="img/marca/logo_favicon.jpg" />
  <link rel="apple-touch-icon" href="img/marca/logo_favicon.jpg" />

  <!-- Open Graph: la imagen y el texto que se ven al compartir el link
       (WhatsApp, Instagram, Facebook, etc.). La imagen DEBE ser una URL
       completa con https, por eso va el dominio entero. Si cambiás de
       dominio, actualizá estas dos líneas con la URL nueva. -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Dulces Antojos — hecho en casa" />
  <meta property="og:description" content="Pastelería casera. Hacé tu pedido y enviálo por WhatsApp." />
  <meta property="og:image" content="https://dulcesantojos.vercel.app/img/marca/logo_head.jpg" />
  <meta property="og:url" content="https://dulcesantojos.vercel.app/" />

  <!-- Lo mismo para Twitter/X (usa sus propias etiquetas) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Dulces Antojos — hecho en casa" />
  <meta name="twitter:description" content="Pastelería casera. Hacé tu pedido y enviálo por WhatsApp." />
  <meta name="twitter:image" content="https://dulcesantojos.vercel.app/img/marca/logo_head.jpg" />

  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <!-- Toda la app vive dentro de este contenedor centrado (look "app en el celu") -->
  <div class="app">

    <!-- 1) Header -->
    <header class="header">
      <h1 class="header__nombre">Dulces Antojos</h1>
      <!-- Logo en el medio, entre el nombre y el lema -->
      <img class="header__logo" src="img/marca/logo.jpg" alt="Dulces Antojos — hecho en casa" />
      <p class="header__lema">— hecho en casa —</p>

      <!-- Íconos de redes (los links se completan desde config.json vía app.js) -->
      <div class="redes">
        <a class="redes__link" id="redWhatsapp" href="#" target="_blank"
           rel="noopener" aria-label="WhatsApp">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.096 3.2 5.077 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
          </svg>
        </a>
        <a class="redes__link" id="redInstagram" href="#" target="_blank"
           rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
            <path fill="currentColor" d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- 2) Barra de categorías (chips). Se llena dinámicamente desde el JSON. -->
    <nav class="chips" id="chips" aria-label="Categorías"></nav>

    <!-- 3) Secciones de productos. Se llenan dinámicamente desde el JSON. -->
    <main class="catalogo" id="catalogo">
      <!-- Mensaje de carga / error. JS lo reemplaza o lo muestra según el caso. -->
      <p class="estado" id="estado">Cargando catálogo…</p>
    </main>

    <!-- Footer al final de todo -->
    <footer class="footer">
      Desarrollado por
      <a href="mailto:sanntin.dev@proton.me">sanntin.dev@proton.me</a>
    </footer>

  </div>

  <!-- 4) Barra fija de pedido (abajo, ancho completo). Solo visible si hay items. -->
  <div class="barra-pedido" id="barraPedido" hidden>
    <div class="barra-pedido__info">
      <span class="barra-pedido__cant" id="barraCant">0 productos</span>
      <span class="barra-pedido__total" id="barraTotal">$0</span>
    </div>
    <button class="barra-pedido__btn" id="barraVerPedido">Ver pedido</button>
  </div>

  <!-- Fondo oscuro detrás del panel del carrito -->
  <div class="overlay" id="overlay" hidden></div>

  <!-- 4b) Panel deslizante (bottom sheet) con el pedido -->
  <section class="sheet" id="sheet" aria-label="Tu pedido" hidden>
    <div class="sheet__header">
      <h2 class="sheet__titulo">Tu pedido</h2>
      <button class="sheet__cerrar" id="sheetCerrar" aria-label="Cerrar">&times;</button>
    </div>

    <div class="sheet__items" id="sheetItems"><!-- items dinámicos --></div>

    <div class="sheet__footer">
      <div class="sheet__total">
        <span>Total</span>
        <span id="sheetTotal">$0</span>
      </div>
      <button class="btn-whatsapp" id="btnWhatsapp">Enviar pedido por WhatsApp</button>
    </div>
  </section>

  <!-- 5) Visor de fotos: al tocar la foto de un producto, se ve en grande.
       Se llena (src) desde app.js y se cierra tocando el fondo, la X o Escape. -->
  <div class="visor" id="visor" hidden>
    <button class="visor__cerrar" id="visorCerrar" aria-label="Cerrar">&times;</button>
    <img class="visor__img" id="visorImg" alt="" />
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
